run_name: iPSC

pathways:
  Wnt:
    genes: [GSK3B, GSK3A, TNKS, TNKS2, PORCN, CTNNB1]
    keywords: [Wnt, beta-catenin, GSK3, tankyrase, porcupine]

  TGFb_Activin_Nodal:
    genes: [TGFBR1, TGFBR2, ACVR1B, ACVR1C, ACVR2A, ACVR2B, SMAD2, SMAD3]
